<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Кухня — VR (relit)</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
<style>
  html, body { margin:0; height:100%; background:#151515; font-family:-apple-system,Helvetica,Arial,sans-serif; }
  #overlay { position:fixed; top:0; left:0; right:0; z-index:5; color:#eee; text-align:center; padding:14px 10px; font-size:14px; background:linear-gradient(rgba(0,0,0,.55),transparent); pointer-events:none; }
  #loading { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#eee; z-index:10; text-align:center; }
  .spinner { width:36px; height:36px; margin:0 auto 12px; border:3px solid rgba(255,255,255,.25); border-top-color:#fff; border-radius:50%; animation:spin .9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="overlay">Надень шлем, нажми «Enter VR» в правом нижнем углу. Ходьба — левый стик, поворот — правый стик.</div>
<div id="loading"><div class="spinner"></div>Загрузка кухни…</div>
<a-scene loading-screen="enabled: false" shadow="type: pcfsoft" renderer="colorManagement: true; physicallyCorrectLights: true; toneMapping: ACESFilmic; exposure: 1.15" fog="type: exponential; color: #4a3f66; density: 0.012">
  <!-- Key: warm directional light, casts shadows -->
  <a-entity light="type: directional; intensity: 1.1; color: #fff2e0; castShadow: true; shadowMapHeight: 2048; shadowMapWidth: 2048; shadowBias: -0.001; shadowCameraLeft: -10; shadowCameraRight: 10; shadowCameraBottom: -10; shadowCameraTop: 10; shadowCameraFar: 22" position="2 4 1"></a-entity>
  <!-- Fill: cooler, dimmer, opposite side, no shadow (softens the key's shadow side) -->
  <a-entity light="type: directional; intensity: 0.35; color: #dbe6ff" position="-3 2.5 -1.5"></a-entity>
  <!-- Rim/back: low warm accent behind the counter, separates model edges from the sky -->
  <a-entity light="type: directional; intensity: 0.45; color: #ffb37a" position="-1 2 -3.5"></a-entity>
  <!-- Ambient: lowered now that the env map contributes its own diffuse/specular IBL -->
  <a-entity light="type: ambient; intensity: 0.35; color: #fff8f0"></a-entity>
  <a-entity light="type: hemisphere; color: #ffe9c7; groundColor: #202020; intensity: 0.45"></a-entity>

  <a-entity id="rig" movement-controls="speed: 0.12; fly: false" position="-0.3 0 2.2" rotation="0 -20 0">
    <a-entity camera look-controls="pointerLockEnabled: true" position="0 1.6 0" wasd-controls="acceleration: 40"></a-entity>
    <a-entity laser-controls="hand: left" raycaster="objects: .clickable" line="color: #ff8844"></a-entity>
    <a-entity laser-controls="hand: right" raycaster="objects: .clickable" line="color: #44aaff"></a-entity>
  </a-entity>

  <!-- dusk sky, matching the skyline backdrop's gradient tone so the open
       ceiling doesn't clash with the evening city view through the windows -->
  <a-sky color="#332c52"></a-sky>
  <!-- shadow-catcher ground, sized to the room footprint (x -0.6..5.6, z -0.65..3.4)
       with a small margin, not a giant 30x30 slab sticking out past the walls -->
  <a-plane rotation="-90 0 0" width="6.6" height="4.5" color="#3a3a3a" position="2.5 -0.02 1.375" shadow="cast: false; receive: true"></a-plane>

  <!--
    Left + right walls, added here as plain primitives rather than baked into
    the glTF (the model is fetched read-only from kitchen_vr2.html, see the
    script below). Positions are computed from the model's own geometry so
    they actually line up: the existing BackWall runs x -0.1..4.3 at z=-0.65,
    and the built-in glass door frame continues that same back wall out to
    x=5.6. So the left wall sits at x=-0.6 (with a small filler panel closing
    the gap back to BackWall's edge at x=-0.1) and the right wall at x=5.6,
    matching that corner. Room runs z=-0.65 (back) to z=3.4 (open front, no
    wall — camera starts at z=2.2 well inside). Ceiling height 2.4m matches
    BackWall/CeilingTrack. Each wall gets one window (sill 1.0m, head 2.2m)
    built the same way as the model's own door: slabs around an opening,
    a glass pane, plus a cross mullion.
  -->
  <a-entity id="room-walls">
    <!-- corner filler: closes the gap between the new left wall and the model's own BackWall -->
    <a-box position="-0.35 1.2 -0.65" width="0.5" height="2.4" depth="0.06" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>

    <!-- LEFT WALL (x = -0.6), window centered z=1.6 -->
    <a-box position="-0.6 0.5 1.375" width="0.06" height="1.0" depth="4.05" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>
    <a-box position="-0.6 2.3 1.375" width="0.06" height="0.2" depth="4.05" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>
    <a-box position="-0.6 1.6 0.175" width="0.06" height="1.2" depth="1.65" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>
    <a-box position="-0.6 1.6 2.8" width="0.06" height="1.2" depth="1.2" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>
    <a-box position="-0.6 1.6 1.6" width="0.06" height="1.2" depth="0.04" color="#2b2b2b" shadow="cast: true; receive: true"></a-box>
    <a-box position="-0.6 1.6 1.6" width="0.06" height="0.04" depth="1.2" color="#2b2b2b" shadow="cast: true; receive: true"></a-box>
    <a-plane position="-0.601 1.6 1.6" rotation="0 90 0" width="1.2" height="1.2" material="color: #cfe3ef; metalness: 0; roughness: 0.05; opacity: 0.35; transparent: true; side: double" shadow="cast: false; receive: true"></a-plane>

    <!-- RIGHT WALL (x = 5.6), window centered z=1.4 -->
    <a-box position="5.6 0.5 1.375" width="0.06" height="1.0" depth="4.05" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>
    <a-box position="5.6 2.3 1.375" width="0.06" height="0.2" depth="4.05" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>
    <a-box position="5.6 1.6 0.075" width="0.06" height="1.2" depth="1.45" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>
    <a-box position="5.6 1.6 2.7" width="0.06" height="1.2" depth="1.4" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>
    <a-box position="5.6 1.6 1.4" width="0.06" height="1.2" depth="0.04" color="#2b2b2b" shadow="cast: true; receive: true"></a-box>
    <a-box position="5.6 1.6 1.4" width="0.06" height="0.04" depth="1.2" color="#2b2b2b" shadow="cast: true; receive: true"></a-box>
    <a-plane position="5.601 1.6 1.4" rotation="0 90 0" width="1.2" height="1.2" material="color: #cfe3ef; metalness: 0; roughness: 0.05; opacity: 0.35; transparent: true; side: double" shadow="cast: false; receive: true"></a-plane>

    <!-- SHARED WALL (z = 3.4) between the kitchen and the second room, now
         with a doorway instead of being fully solid: two jambs + a lintel,
         opening is x 1.95..3.05 (1.1m wide), floor to 2.15m. -->
    <a-box position="0.675 1.2 3.4" width="2.55" height="2.4" depth="0.06" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>
    <a-box position="4.325 1.2 3.4" width="2.55" height="2.4" depth="0.06" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>
    <a-box position="2.5 2.275 3.4" width="1.1" height="0.25" depth="0.06" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>
  </a-entity>

  <!--
    SECOND ROOM (cozy nook): x -0.6..5.6 (same width as the kitchen), z
    3.4..7.4 (through the doorway above). Left + far walls plain; right wall
    (x=5.6) gets a window, same recipe as the kitchen's windows. TV mounts on
    the far wall (z=7.4) facing back through the doorway; the two armchairs,
    coffee table, rug and floor lamp are added via JS in setupLivingRoom()
    since they're built from a shared reusable primitive (see script below).
  -->
  <a-entity id="room2-walls">
    <a-box position="-0.6 1.2 5.4" width="0.06" height="2.4" depth="4.0" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>
    <a-box position="2.5 1.2 7.4" width="6.2" height="2.4" depth="0.06" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>

    <!-- RIGHT WALL of room 2 (x = 5.6), window centered z=5.4 -->
    <a-box position="5.6 0.5 5.4" width="0.06" height="1.0" depth="4.0" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>
    <a-box position="5.6 2.3 5.4" width="0.06" height="0.2" depth="4.0" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>
    <a-box position="5.6 1.6 4.05" width="0.06" height="1.2" depth="1.3" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>
    <a-box position="5.6 1.6 6.75" width="0.06" height="1.2" depth="1.3" material="color: #dcd5c8; roughness: 0.85; metalness: 0" shadow="cast: true; receive: true"></a-box>
    <a-box position="5.6 1.6 5.4" width="0.06" height="1.2" depth="0.04" color="#2b2b2b" shadow="cast: true; receive: true"></a-box>
    <a-box position="5.6 1.6 5.4" width="0.06" height="0.04" depth="1.4" color="#2b2b2b" shadow="cast: true; receive: true"></a-box>
    <a-plane position="5.601 1.6 5.4" rotation="0 90 0" width="1.4" height="1.2" material="color: #cfe3ef; metalness: 0; roughness: 0.05; opacity: 0.35; transparent: true; side: double" shadow="cast: false; receive: true"></a-plane>
  </a-entity>

  <!-- CEILING: one plane spanning both rooms (x -0.6..5.6, z -0.9..7.4),
       capping the walls at the same 2.4m height. rotation="90 0 0" faces the
       plane's normal downward (opposite of the floor's "-90 0 0") so it's
       visible looking up from inside the rooms. -->
  <a-plane position="2.5 2.4 3.25" rotation="90 0 0" width="6.2" height="8.3" material="color: #ece6d8; roughness: 0.95; metalness: 0" shadow="cast: false; receive: true"></a-plane>
</a-scene>

<script>
// This page reuses the kitchen model already published as kitchen_vr2.html in
// this same repo (same-origin fetch, no re-upload of the 2MB embedded glTF)
// and applies lighting/shadow/material fixes to it after load. See the
// writeup: original had flat ambient-only lighting, no shadows, no
// environment map for PBR reflections, and a couple of material bugs
// (a material literally named "BlackMetal" had metalness=0, and two
// KHR_materials_specular tints were >1.0, out of valid range).

async function loadKitchen() {
  const res = await fetch('https://ghostvip1717-glitch.github.io/-/kitchen_vr2.html');
  const text = await res.text();
  const m = text.match(/const b64\s*=\s*"([A-Za-z0-9+/=]+)"/);
  if (!m) {
    document.getElementById('loading').innerHTML = 'Не удалось найти модель в kitchen_vr2.html :(';
    return;
  }
  const bin = atob(m[1]);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const blob = new Blob([bytes], { type: 'model/gltf-binary' });
  const blobUrl = URL.createObjectURL(blob);

  const kitchen = document.createElement('a-entity');
  kitchen.setAttribute('gltf-model', blobUrl);
  kitchen.setAttribute('position', '0 0 0');
  kitchen.setAttribute('rotation', '0 0 0');
  kitchen.setAttribute('shadow', 'cast: true; receive: true');
  kitchen.addEventListener('model-loaded', (e) => {
    document.getElementById('loading').style.display = 'none';
    fixMaterials(e.detail.model);
  });
  kitchen.addEventListener('model-error', (e) => {
    document.getElementById('loading').innerHTML = 'Не удалось загрузить модель :(';
    console.error(e);
  });
  document.querySelector('a-scene').appendChild(kitchen);
}

// Procedural "basket weave" block parquet (классический штучный паркет):
// a grid of square blocks, each block filled with parallel wood strips,
// and neighboring blocks (checkerboard) rotated 90° from each other. A
// matching normal map is baked from the same layout so the strip seams
// and block frames actually catch light instead of looking painted-on.
function buildParquetBlocks(w, h) {
  const tilesX = 6, tilesY = 6;
  const tileW = w / tilesX, tileH = h / tilesY;
  const stripsPerTile = 5;
  const blocks = [];
  for (let ty = 0; ty < tilesY; ty++) {
    for (let tx = 0; tx < tilesX; tx++) {
      blocks.push({
        x: tx * tileW, y: ty * tileH, w: tileW, h: tileH,
        horizontal: (tx + ty) % 2 === 0,
        hueJitter: (Math.random() * 6 - 3),
        lightJitter: (Math.random() * 8 - 4)
      });
    }
  }
  return { blocks, tileW, tileH, stripsPerTile };
}

function paintParquetStrips(ctx, layout, hueBase, drawStrip) {
  const { blocks, stripsPerTile } = layout;
  blocks.forEach((b) => {
    const stripLenAxis = b.horizontal ? b.w : b.h;
    const stripThickAxis = (b.horizontal ? b.h : b.w) / stripsPerTile;
    for (let s = 0; s < stripsPerTile; s++) {
      const alt = s % 2 === 0;
      const hue = hueBase + b.hueJitter + (alt ? 1 : -1) * 1.5;
      const light = 42 + b.lightJitter + (alt ? 6 : -3) + Math.random() * 4;
      const sat = 34 + Math.random() * 14;
      let sx, sy, sw, sh;
      if (b.horizontal) {
        sx = b.x; sy = b.y + s * stripThickAxis; sw = stripLenAxis; sh = stripThickAxis;
      } else {
        sx = b.x + s * stripThickAxis; sy = b.y; sw = stripThickAxis; sh = stripLenAxis;
      }
      drawStrip(sx, sy, sw, sh, b.horizontal, hue, sat, light);
    }
    // frame seam around the whole block (the border between basket-weave tiles)
    drawStrip.frame && drawStrip.frame(b.x, b.y, b.w, b.h);
  });
}

function makeParquetColorMap(THREE, layout, w, h) {
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const hueBase = 32; // warm honey-oak, lacquered

  const drawStrip = (sx, sy, sw, sh, horizontal, hue, sat, light) => {
    const pad = 1;
    const pw = sw - pad * 2, ph = sh - pad * 2;
    const x = sx + pad, y = sy + pad;
    ctx.fillStyle = `hsl(${hue}, ${sat}%, ${light}%)`;
    ctx.fillRect(x, y, pw, ph);

    // grain streaks running along the strip's long axis
    ctx.save();
    ctx.beginPath();
    ctx.rect(x, y, pw, ph);
    ctx.clip();
    const streaks = 3 + Math.floor(Math.random() * 3);
    for (let i = 0; i < streaks; i++) {
      ctx.strokeStyle = `hsla(${hue}, ${sat}%, ${Math.max(0, light - (8 + Math.random() * 12))}%, ${0.2 + Math.random() * 0.25})`;
      ctx.lineWidth = 0.5 + Math.random() * 1.1;
      ctx.beginPath();
      if (horizontal) {
        const gy = y + Math.random() * ph;
        ctx.moveTo(x, gy);
        ctx.bezierCurveTo(x + pw * 0.3, gy + (Math.random() * 3 - 1.5), x + pw * 0.7, gy + (Math.random() * 3 - 1.5), x + pw, gy + (Math.random() * 2 - 1));
      } else {
        const gx = x + Math.random() * pw;
        ctx.moveTo(gx, y);
        ctx.bezierCurveTo(gx + (Math.random() * 3 - 1.5), y + ph * 0.3, gx + (Math.random() * 3 - 1.5), y + ph * 0.7, gx + (Math.random() * 2 - 1), y + ph);
      }
      ctx.stroke();
    }
    ctx.restore();

    // beveled edge per strip: light top/left, dark bottom/right
    ctx.strokeStyle = `hsla(${hue}, ${sat}%, ${Math.min(100, light + 14)}%, 0.5)`;
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(x, y + ph); ctx.lineTo(x, y); ctx.lineTo(x + pw, y);
    ctx.stroke();
    ctx.strokeStyle = `hsla(${hue}, ${sat}%, ${Math.max(0, light - 22)}%, 0.6)`;
    ctx.beginPath();
    ctx.moveTo(x + pw, y); ctx.lineTo(x + pw, y + ph); ctx.lineTo(x, y + ph);
    ctx.stroke();
  };
  drawStrip.frame = (bx, by, bw, bh) => {
    ctx.strokeStyle = `hsla(${hueBase}, 30%, 22%, 0.55)`;
    ctx.lineWidth = 1.6;
    ctx.strokeRect(bx + 0.8, by + 0.8, bw - 1.6, bh - 1.6);
  };

  paintParquetStrips(ctx, layout, hueBase, drawStrip);

  const tex = new THREE.CanvasTexture(canvas);
  if ('SRGBColorSpace' in THREE) tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeParquetNormalMap(THREE, layout, w, h) {
  const hCanvas = document.createElement('canvas');
  hCanvas.width = w; hCanvas.height = h;
  const hctx = hCanvas.getContext('2d');
  hctx.fillStyle = '#9a9a9a';
  hctx.fillRect(0, 0, w, h);

  const drawStrip = (sx, sy, sw, sh) => {
    const pad = 1;
    const pw = sw - pad * 2, ph = sh - pad * 2;
    const x = sx + pad, y = sy + pad;
    const shade = 150 + Math.floor(Math.random() * 25);
    hctx.fillStyle = `rgb(${shade},${shade},${shade})`;
    hctx.fillRect(x, y, pw, ph);
    hctx.strokeStyle = 'rgb(70,70,70)';
    hctx.lineWidth = 1.5;
    hctx.strokeRect(x, y, pw, ph);
  };
  drawStrip.frame = (bx, by, bw, bh) => {
    hctx.strokeStyle = 'rgb(35,35,35)';
    hctx.lineWidth = 2.5;
    hctx.strokeRect(bx + 0.8, by + 0.8, bw - 1.6, bh - 1.6);
  };

  paintParquetStrips(hctx, layout, 0, drawStrip);

  const heightData = hctx.getImageData(0, 0, w, h).data;
  const nCanvas = document.createElement('canvas');
  nCanvas.width = w; nCanvas.height = h;
  const nctx = nCanvas.getContext('2d');
  const nImg = nctx.createImageData(w, h);
  const strength = 2.6;
  const hgt = (x, y) => {
    x = (x + w) % w; y = (y + h) % h;
    return heightData[(y * w + x) * 4] / 255;
  };
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const dx = (hgt(x + 1, y) - hgt(x - 1, y)) * strength;
      const dy = (hgt(x, y + 1) - hgt(x, y - 1)) * strength;
      const len = Math.sqrt(dx * dx + dy * dy + 1);
      const idx = (y * w + x) * 4;
      nImg.data[idx] = ((-dx / len) * 0.5 + 0.5) * 255;
      nImg.data[idx + 1] = ((-dy / len) * 0.5 + 0.5) * 255;
      nImg.data[idx + 2] = ((1 / len) * 0.5 + 0.5) * 255;
      nImg.data[idx + 3] = 255;
    }
  }
  nctx.putImageData(nImg, 0, 0);

  return new THREE.CanvasTexture(nCanvas);
}

function makeParquetMaps(THREE, renderer) {
  const colorW = 1024, colorH = 1024;
  const normalW = 512, normalH = 512; // lower res is plenty for a bump map, much cheaper to compute
  const colorLayout = buildParquetBlocks(colorW, colorH);
  const normalLayout = buildParquetBlocks(normalW, normalH);

  const map = makeParquetColorMap(THREE, colorLayout, colorW, colorH);
  const normalMap = makeParquetNormalMap(THREE, normalLayout, normalW, normalH);

  const maxAniso = renderer && renderer.capabilities ? renderer.capabilities.getMaxAnisotropy() : 1;
  // Equal repeat on both axes keeps the basket-weave blocks square (matches
  // the original concrete floor texture's own KHR_texture_transform scale
  // of [8,8] on this same mesh, so it's a good calibration reference).
  [map, normalMap].forEach((tex) => {
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(80, 80);
    tex.anisotropy = maxAniso;
    tex.needsUpdate = true;
  });

  return { map, normalMap };
}

// Runtime material patch (equivalent of editing the glTF materials directly):
// - "BlackMetal" (Sink, Faucet_Vertical, Faucet_Spout) was exported with
//   metalness=0 despite the name -> reads as matte black plastic. Bump it to
//   an actual brushed-metal value.
// - "Counter" and "dark_wooden_planks_material_CabinetFront_0" have a
//   KHR_materials_specular tint >1.0 (1.2 / 1.1), which is out of the valid
//   [0,1] range for a specular color factor -> clamp it.
// - "concrete_layers_02_material_BackWall" (the wall, node "BackWall" only —
//   not any cabinet) swapped from a concrete photo-texture to a plain solid
//   wall-paint color.
// - "concrete_floor_02_material_Floor" (the kitchen floor, node "Floor" —
//   not the exterior ground outside the window) swapped from concrete to a
//   procedural parquet/wood-plank texture.
let parquetMaps = null;
function fixMaterials(model) {
  const THREE = AFRAME.THREE;
  const renderer = document.querySelector('a-scene').renderer;
  const seen = new Set();
  model.traverse((obj) => {
    if (!obj.isMesh) return;
    obj.castShadow = true;
    obj.receiveShadow = true;
    const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
    mats.forEach((mat) => {
      if (!mat || seen.has(mat.uuid)) return;
      seen.add(mat.uuid);
      if (mat.name === 'BlackMetal') {
        mat.metalness = 0.9;
        mat.roughness = 0.3;
        mat.needsUpdate = true;
      }
      if ((mat.name === 'Counter' || mat.name === 'dark_wooden_planks_material_CabinetFront_0') && mat.specularColor) {
        mat.specularColor.setRGB(
          Math.min(1, mat.specularColor.r),
          Math.min(1, mat.specularColor.g),
          Math.min(1, mat.specularColor.b)
        );
        mat.needsUpdate = true;
      }
      if (mat.name === 'concrete_layers_02_material_BackWall') {
        mat.map = null;
        mat.normalMap = null;
        mat.metalnessMap = null;
        mat.roughnessMap = null;
        mat.color.setStyle('#dcd5c8'); // plain warm off-white wall paint
        mat.metalness = 0;
        mat.roughness = 0.85;
        mat.needsUpdate = true;

function loadSkylinePhoto(THREE) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    const timer = setTimeout(() => resolve(null), 9000);
    img.onload = () => {
      clearTimeout(timer);
      if (!img.naturalWidth) { resolve(null); return; }
      const tex = new THREE.Texture(img);
      if ('SRGBColorSpace' in THREE) tex.colorSpace = THREE.SRGBColorSpace;
      tex.needsUpdate = true;
      resolve(tex);
    };
    img.onerror = () => { clearTimeout(timer); resolve(null); };
    img.src = SKYLINE_PHOTO_URL;
  });
}

// "object-fit: cover" for a texture on a plane of a given aspect ratio, so a
// real photo (whatever its native aspect) fills the window without stretching
// — crops the long axis instead of squashing the image to fit.
function fitCoverTexture(THREE, tex, planeAspect) {
  const img = tex.image;
  if (!img || !img.width || !img.height) return;
  const imgAspect = img.width / img.height;
  tex.wrapS = THREE.ClampToEdgeWrapping;
  tex.wrapT = THREE.ClampToEdgeWrapping;
  if (imgAspect > planeAspect) {
    const scale = planeAspect / imgAspect;
    tex.repeat.set(scale, 1);
    tex.offset.set((1 - scale) / 2, 0);
  } else {
    const scale = imgAspect / planeAspect;
    tex.repeat.set(1, scale);
    tex.offset.set(0, (1 - scale) / 2);
  }
  tex.needsUpdate = true;
}

// Procedural New York-style dusk skyline (canvas-based fallback, used only if
// the real photo above can't load). Three parallax layers with atmospheric
// haze (farther = lighter/lower contrast), lit windows, a couple of
// tiered/spired "signature" towers, stars and a horizon glow — the classic
// recipe for a convincing dusk skyline without needing photographic detail.
function makeSkylineTexture(THREE) {
  const w = 2048, h = 900;
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  const sky = ctx.createLinearGradient(0, 0, 0, h);
  sky.addColorStop(0, '#1b1740');
  sky.addColorStop(0.35, '#3c2f66');
  sky.addColorStop(0.62, '#a85a72');
  sky.addColorStop(0.8, '#e8935f');
  sky.addColorStop(1, '#f6b878');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, w, h);

  for (let i = 0; i < 180; i++) {
    const sx = Math.random() * w;
    const sy = Math.random() * h * 0.42;
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.6})`;
    ctx.fillRect(sx, sy, 1, 1);
  }

  const glow = ctx.createRadialGradient(w * 0.5, h * 0.82, 0, w * 0.5, h * 0.82, w * 0.45);
  glow.addColorStop(0, 'rgba(255,200,140,0.55)');
  glow.addColorStop(1, 'rgba(255,200,140,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, w, h);

  const horizonY = h * 0.82;

  function buildingLayer(color, winColor, baseY, minH, maxH, minW, maxW, gap, winChance) {
    let x = -20;
    while (x < w + 20) {
      const bw = minW + Math.random() * (maxW - minW);
      const bh = minH + Math.random() * (maxH - minH);
      const by = baseY - bh;
      ctx.fillStyle = color;
      ctx.fillRect(x, by, bw, bh + 40);
      if (Math.random() < 0.15) {
        const tw = bw * 0.4, th = bh * 0.25;
        ctx.fillRect(x + (bw - tw) / 2, by - th, tw, th);
        if (Math.random() < 0.5) ctx.fillRect(x + bw / 2 - 1, by - th - 30, 2, 30);
      }
      if (winChance > 0) {
        const cols = Math.max(2, Math.floor(bw / 9));
        const rows = Math.max(3, Math.floor(bh / 14));
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            if (Math.random() < winChance) {
              ctx.globalAlpha = 0.5 + Math.random() * 0.5;
              ctx.fillStyle = winColor;
              ctx.fillRect(x + 3 + c * (bw / cols), by + 6 + r * (bh / rows), 3, 4);
              ctx.globalAlpha = 1;
            }
          }
        }
      }
      x += bw + (2 + Math.random() * gap);
    }
  }

  buildingLayer('#5f5f86', 'rgba(255,225,180,0.5)', horizonY - 10, 60, 160, 30, 70, 10, 0.05);
  buildingLayer('#3a3555', 'rgba(255,214,150,0.75)', horizonY, 90, 260, 35, 90, 8, 0.14);
  buildingLayer('#1e1b30', 'rgba(255,221,150,0.95)', horizonY + 20, 140, 420, 40, 110, 6, 0.22);

  const tex = new THREE.CanvasTexture(canvas);
  if ('SRGBColorSpace' in THREE) tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// Big unlit backdrop planes just outside each window opening. Unlit
// (MeshBasicMaterial) on purpose — a skyline kilometers away shouldn't
// visibly react to the kitchen's interior key/fill lights, that's what
// would make it read as "pasted on". Large + far enough back that the
// picture's edges stay out of view from inside the room.
function setupSkyline(THREE, skylineTex) {
  const sceneEl = document.querySelector('a-scene');
  const mat = new THREE.MeshBasicMaterial({ map: skylineTex, side: THREE.DoubleSide, fog: true });
  const geo = new THREE.PlaneGeometry(70, 30);

  const left = new THREE.Mesh(geo, mat);
  left.position.set(-20, 9, 1.6);
  left.rotation.y = Math.PI / 2;
  sceneEl.object3D.add(left);

  const right = new THREE.Mesh(geo, mat);
  right.position.set(21, 9, 1.4);
  right.rotation.y = -Math.PI / 2;
  sceneEl.object3D.add(right);
}

// Procedural environment map (no external HDRI file needed). Without this,
// PBR metals/glass have nothing to reflect and read as flat "plastic" even
// with correct roughness/metalness, because the flat-color <a-sky> is only
// a background, not a light/reflection source. We bake a small synthetic
// room (gradient sky + window panels, now tinted by the same skyline so the
// glossy parquet/metal reflections hint at the city instead of an unrelated
// generic room) into a PMREM environment map and assign it to scene.environment.
function setupEnvironment(THREE, skylineTex) {
  const sceneEl = document.querySelector('a-scene');
  const renderer = sceneEl.renderer;
  if (!renderer) return;

  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();

  const envScene = new THREE.Scene();

  const skyGeo = new THREE.SphereGeometry(50, 32, 16);
  const skyMat = new THREE.ShaderMaterial({
    uniforms: {
      topColor: { value: new THREE.Color('#332c52') },
      bottomColor: { value: new THREE.Color('#241f3d') }
    },
    vertexShader: `
      varying vec3 vWorldPosition;
      void main() {
        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
        vWorldPosition = worldPosition.xyz;
        gl_Position = projectionMatrix * viewMatrix * worldPosition;
      }`,
    fragmentShader: `
      varying vec3 vWorldPosition;
      uniform vec3 topColor;
      uniform vec3 bottomColor;
      void main() {
        float h = normalize(vWorldPosition).y * 0.5 + 0.5;
        gl_FragColor = vec4(mix(bottomColor, topColor, h), 1.0);
      }`,
    side: THREE.BackSide
  });
  envScene.add(new THREE.Mesh(skyGeo, skyMat));

  // the skyline itself, so reflections pick up its warm/cool color bands
  const skylinePanel = new THREE.Mesh(
    new THREE.PlaneGeometry(30, 14),
    new THREE.MeshBasicMaterial({ map: skylineTex, side: THREE.DoubleSide })
  );
  skylinePanel.position.set(-10, 4, 0);
  skylinePanel.lookAt(0, 1.2, 0);
  envScene.add(skylinePanel);

  const warmMat = new THREE.MeshBasicMaterial({ color: '#ffb37a' });
  const strip = new THREE.Mesh(new THREE.PlaneGeometry(2, 0.6), warmMat);
  strip.position.set(-1, 2, -4);
  strip.lookAt(0, 1, 0);
  envScene.add(strip);

  const envMap = pmrem.fromScene(envScene, 0.035).texture;
  sceneEl.object3D.environment = envMap;

  envScene.traverse((o) => {
    if (o.geometry) o.geometry.dispose();
    if (o.material) o.material.dispose();
  });
  pmrem.dispose();
}

// --- Second room furnishing: floor extension, TV, two armchairs, coffee
// table, rug, floor lamp. Built from primitives (boxes/cylinders) in the
// same procedural spirit as the rest of the scene — added via JS rather
// than static markup because the floor reuses the same generated parquet
// texture as the kitchen floor, for a seamless look between the two rooms.

function makeArmchair(THREE, color) {
  const group = new THREE.Group();
  const fabric = new THREE.MeshStandardMaterial({ color, roughness: 0.85, metalness: 0 });
  const wood = new THREE.MeshStandardMaterial({ color: '#3a2a1c', roughness: 0.6, metalness: 0 });

  const seat = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.14, 0.6), fabric);
  seat.position.set(0, 0.42, 0);
  group.add(seat);

  const back = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.58, 0.12), fabric);
  back.position.set(0, 0.72, -0.24);
  group.add(back);

  [-0.29, 0.29].forEach((armX) => {
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.26, 0.58), fabric);
    arm.position.set(armX, 0.58, -0.02);
    group.add(arm);
  });

  const legGeo = new THREE.CylinderGeometry(0.025, 0.02, 0.14, 8);
  [[-0.24, -0.22], [0.24, -0.22], [-0.24, 0.22], [0.24, 0.22]].forEach(([lx, lz]) => {
    const leg = new THREE.Mesh(legGeo, wood);
    leg.position.set(lx, 0.07, lz);
    group.add(leg);
  });

  group.traverse((o) => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
  return group;
}

function makeCoffeeTable(THREE) {
  const group = new THREE.Group();
  const wood = new THREE.MeshStandardMaterial({ color: '#5a3d24', roughness: 0.35, metalness: 0 });
  const metal = new THREE.MeshStandardMaterial({ color: '#2b2b2b', roughness: 0.4, metalness: 0.8 });

  const top = new THREE.Mesh(new THREE.CylinderGeometry(0.36, 0.36, 0.04, 32), wood);
  top.position.set(0, 0.4, 0);
  group.add(top);

  const pedestal = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.36, 12), metal);
  pedestal.position.set(0, 0.2, 0);
  group.add(pedestal);

  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.02, 32), metal);
  base.position.set(0, 0.02, 0);
  group.add(base);

  group.traverse((o) => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
  return group;
}

function makeFloorLamp(THREE) {
  const group = new THREE.Group();
  const metal = new THREE.MeshStandardMaterial({ color: '#2b2b2b', roughness: 0.4, metalness: 0.85 });
  const shade = new THREE.MeshStandardMaterial({ color: '#f3e3c2', roughness: 0.7, metalness: 0, emissive: '#ffdca0', emissiveIntensity: 0.35 });

  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.16, 0.03, 24), metal);
  base.position.set(0, 0.015, 0);
  group.add(base);

  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 1.3, 10), metal);
  pole.position.set(0, 0.68, 0);
  group.add(pole);

  const shadeMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.22, 0.32, 20, 1, true), shade);
  shadeMesh.position.set(0, 1.38, 0);
  group.add(shadeMesh);

  group.traverse((o) => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });

  const glow = new THREE.PointLight('#ffcf8f', 0.6, 3.5, 2);
  glow.position.set(0, 1.35, 0);
  group.add(glow);

  return group;
}

function makeTV(THREE) {
  const group = new THREE.Group();
  const bezel = new THREE.MeshStandardMaterial({ color: '#0d0d0d', roughness: 0.4, metalness: 0.3 });
  const screen = new THREE.MeshStandardMaterial({ color: '#16222e', roughness: 0.2, metalness: 0.1, emissive: '#2a4a68', emissiveIntensity: 0.25 });

  const body = new THREE.Mesh(new THREE.BoxGeometry(1.15, 0.68, 0.05), bezel);
  group.add(body);

  const panel = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.58, 0.01), screen);
  panel.position.set(0, 0, -0.028);
  group.add(panel);

  group.traverse((o) => { if (o.isMesh) { o.castShadow = false; o.receiveShadow = true; } });
  return group;
}

function setupLivingRoom(THREE, renderer) {
  const sceneEl = document.querySelector('a-scene');

  // floor for room 2 — same parquet artwork as the kitchen, cloned rather
  // than reused directly: this plane has clean 0..1 UVs (unlike the kitchen
  // mesh, whose own UV scale needed repeat=80 to read as small blocks — see
  // makeParquetMaps below), so it needs its own, much lower, repeat count to
  // land on the same real-world block size. Sharing one Texture instance
  // would make the two rooms' repeat settings stomp on each other.
  if (!parquetMaps) parquetMaps = makeParquetMaps(THREE, renderer);
  const room2Map = parquetMaps.map.clone();
  const room2NormalMap = parquetMaps.normalMap.clone();
  room2Map.repeat.set(34, 22);
  room2NormalMap.repeat.set(34, 22);
  room2Map.needsUpdate = true;
  room2NormalMap.needsUpdate = true;
  const floorMat = new THREE.MeshStandardMaterial({
    map: room2Map, normalMap: room2NormalMap,
    normalScale: new THREE.Vector2(0.7, 0.7), roughness: 0.28, metalness: 0
  });
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(6.2, 4.0), floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.set(2.5, -0.005, 5.4);
  floor.receiveShadow = true;
  sceneEl.object3D.add(floor);

  // rug under the seating area
  const rug = new THREE.Mesh(
    new THREE.CircleGeometry(1.35, 40),
    new THREE.MeshStandardMaterial({ color: '#8a5c46', roughness: 0.95, metalness: 0 })
  );
  rug.rotation.x = -Math.PI / 2;
  rug.position.set(2.5, 0.002, 5.9);
  rug.receiveShadow = true;
  sceneEl.object3D.add(rug);

  // TV, mounted on the far wall (z=7.4), facing back toward the doorway
  const tv = makeTV(THREE);
  tv.position.set(2.5, 1.3, 7.36);
  sceneEl.object3D.add(tv);

  // two armchairs angled toward the TV and each other — a cozy "V"
  const chairColor = '#a8583f';
  const left = makeArmchair(THREE, chairColor);
  left.position.set(1.5, 0, 5.7);
  left.rotation.y = THREE.MathUtils.degToRad(20);
  sceneEl.object3D.add(left);

  const right = makeArmchair(THREE, chairColor);
  right.position.set(3.5, 0, 5.7);
  right.rotation.y = THREE.MathUtils.degToRad(-20);
  sceneEl.object3D.add(right);

  // coffee table between the chairs
  const table = makeCoffeeTable(THREE);
  table.position.set(2.5, 0, 6.05);
  sceneEl.object3D.add(table);

  // floor lamp for a warm reading-corner glow
  const lamp = makeFloorLamp(THREE);
  lamp.position.set(0.75, 0, 5.55);
  sceneEl.object3D.add(lamp);
}

const sceneEl = document.querySelector('a-scene');
async function boot() {
  const THREE = AFRAME.THREE;
  loadKitchen(); // kick off the (also async) model fetch in parallel, no need to wait on it

  const renderer = sceneEl.renderer;
  parquetMaps = makeParquetMaps(THREE, renderer); // built eagerly: needed for both the kitchen floor and room 2's floor
  setupLivingRoom(THREE, renderer);

  let skylineTex = await loadSkylinePhoto(THREE);
  if (skylineTex) {
    fitCoverTexture(THREE, skylineTex, 70 / 30); // matches the backdrop plane's aspect ratio
  } else {
    skylineTex = makeSkylineTexture(THREE); // photo didn't load — fall back to the procedural version
  }
  setupEnvironment(THREE, skylineTex);
  setupSkyline(THREE, skylineTex);
}
if (sceneEl.hasLoaded) {
  boot();
} else {
  sceneEl.addEventListener('loaded', boot);
}
</script>
</body>
</html>
